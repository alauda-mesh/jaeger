name: Alauda Build Jaeger

on:
  pull_request:
    paths:
      - "cmd/jaeger/**"
      - "cmd/es-rollover/**"
      - "cmd/es-index-cleaner/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/alauda-build-jaeger.yaml"
  push:
    tags:
      - "v*-r*"
  workflow_dispatch:
    inputs:
      epoch:
        description: Release epoch
        required: true
        type: number
        default: 0

run-name: >-
  ${{ github.event_name == 'push' && format('Release {0}', github.ref_name) ||
      github.event_name == 'workflow_dispatch' && format('Manual build (epoch={0})', inputs.epoch) ||
      format('PR #{0}', github.event.pull_request.number) }}

env:
  GOPROXY: "https://goproxy.cn,direct"
  PLATFORMS: linux/amd64,linux/arm64
  IMG_PREFIX: build-harbor.alauda.cn/asm

permissions:
  contents: read

jobs:
  determine-version:
    name: Determine Jaeger version
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.image-version.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine image version
        id: image-version
        run: |
          # 从 git tag 中提取 Jaeger 版本
          JAEGER_VERSION=$(scripts/utils/compute-version.sh)
          if [ "$JAEGER_VERSION" = "0.0.0" ]; then
            echo "::error::无法确定 Jaeger 版本，请确保存在有效的 git tag"
            exit 1
          fi
          # 去除 v 前缀和 -rN 后缀，统一为纯语义版本号（如 v2.16.0-r1 → 2.16.0）
          JAEGER_VERSION_NO_V=${JAEGER_VERSION#v}
          JAEGER_VERSION_NO_V=${JAEGER_VERSION_NO_V%%-r*}
          echo "::notice::JAEGER_VERSION_NO_V: ${JAEGER_VERSION_NO_V}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${JAEGER_VERSION_NO_V}-r${{ inputs.epoch }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            REF_TAG=${{ github.ref_name }}
            EPOCH=$(echo $REF_TAG | sed 's/.*-r//')
            TAG="${JAEGER_VERSION_NO_V}-r${EPOCH}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG="${JAEGER_VERSION_NO_V}-pr.${{ github.event.pull_request.number }}.${{ github.run_number }}"
          fi

          echo "::notice::镜像 tag: ${TAG}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  build-binaries:
    name: Build jaeger, es-rollover and es-index-cleaner binaries - ${{ matrix.arch }}
    runs-on:
      [self-hosted, linux, "${{ matrix.arch == 'arm64' && 'arm64' || 'x64' }}"]
    needs: [determine-version]

    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]

    env:
      http_proxy: ${{ vars.http_proxy }}
      https_proxy: ${{ vars.https_proxy }}
      no_proxy: ${{ vars.no_proxy }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch git tags
        run: |
          git fetch --prune --unshallow --tags 2>/dev/null || git fetch --prune --tags

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "~1.26.1"
          cache: false

      # jaeger-query 包含 UI，提前统一安装，对 es-rollover 构建无影响
      - name: Setup Node.js version
        uses: ./.github/actions/setup-node.js

      - name: Install CI tools
        run: make install-ci

      - name: Build jaeger binary
        run: |
          GOOS=linux GOARCH=${{ matrix.arch }} make build-jaeger \
            -e LD_EXTRAFLAGS="${LD_EXTRAFLAGS}"
        env:
          SKIP_DEBUG_BINARIES: "1"
          LD_EXTRAFLAGS: ${{ vars.LD_EXTRAFLAGS }}

      - name: Build es-rollover binary
        run: |
          GOOS=linux GOARCH=${{ matrix.arch }} make build-es-rollover \
            -e LD_EXTRAFLAGS="${LD_EXTRAFLAGS}"
        env:
          SKIP_DEBUG_BINARIES: "1"
          LD_EXTRAFLAGS: ${{ vars.LD_EXTRAFLAGS }}

      - name: Build es-index-cleaner binary
        run: |
          GOOS=linux GOARCH=${{ matrix.arch }} make build-es-index-cleaner \
            -e LD_EXTRAFLAGS="${LD_EXTRAFLAGS}"
        env:
          SKIP_DEBUG_BINARIES: "1"
          LD_EXTRAFLAGS: ${{ vars.LD_EXTRAFLAGS }}

      - name: Upload jaeger binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: jaeger-linux-${{ matrix.arch }}
          path: cmd/jaeger/jaeger-linux-${{ matrix.arch }}
          retention-days: 1

      - name: Upload es-rollover binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: es-rollover-linux-${{ matrix.arch }}
          path: cmd/es-rollover/es-rollover-linux-${{ matrix.arch }}
          retention-days: 1

      - name: Upload es-index-cleaner binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: es-index-cleaner-linux-${{ matrix.arch }}
          path: cmd/es-index-cleaner/es-index-cleaner-linux-${{ matrix.arch }}
          retention-days: 1

  build-and-push-images:
    name: Build ${{ matrix.component }} image - ${{ matrix.arch }}
    runs-on:
      [self-hosted, linux, "${{ matrix.arch == 'arm64' && 'arm64' || 'x64' }}"]
    needs: [determine-version, build-binaries]

    strategy:
      fail-fast: false
      matrix:
        component: [jaeger, es-rollover, es-index-cleaner]
        arch: [amd64, arm64]

    env:
      http_proxy: ${{ vars.http_proxy }}
      https_proxy: ${{ vars.https_proxy }}
      no_proxy: ${{ vars.no_proxy }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to build-harbor.alauda.cn
        uses: docker/login-action@v4
        with:
          registry: build-harbor.alauda.cn
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Download binary artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.component }}-linux-${{ matrix.arch }}
          path: cmd/${{ matrix.component }}/

      - name: Prepare build context
        run: |
          chmod +x cmd/${{ matrix.component }}/${{ matrix.component }}-linux-${{ matrix.arch }}

      - name: Determine image name and platform tag
        id: image-info
        run: |
          echo "tag=${{ needs.determine-version.outputs.tag }}-${{ matrix.arch }}" >> $GITHUB_OUTPUT
          # 镜像名称映射：es-rollover -> jaeger-es-rollover，es-index-cleaner -> jaeger-es-index-cleaner，与官方命名保持一致
          case "${{ matrix.component }}" in
            es-rollover)       echo "image_name=jaeger-es-rollover" >> $GITHUB_OUTPUT ;;
            es-index-cleaner)  echo "image_name=jaeger-es-index-cleaner" >> $GITHUB_OUTPUT ;;
            *)                 echo "image_name=${{ matrix.component }}" >> $GITHUB_OUTPUT ;;
          esac

      - name: Build and push ${{ matrix.component }} image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/${{ matrix.arch }}
          context: cmd/${{ matrix.component }}
          file: cmd/${{ matrix.component }}/Dockerfile
          push: true
          # debug_image 添加默认值，避免构建 release target 时报错（下面的 target 已经指定 release，不会构建 debug 镜像）
          build-args: |
            base_image=build-harbor.alauda.cn/mlops/static@sha256:d2185a95c5e553a32e4f82d8138ccb78b57242f987985bd089ae2fb3c21e18d0
            TARGETARCH=${{ matrix.arch }}
          target: release
          tags: |
            ${{ env.IMG_PREFIX }}/${{ steps.image-info.outputs.image_name }}:${{ steps.image-info.outputs.tag }}
        env:
          DOCKER_BUILD_SUMMARY: false

  merge-manifests:
    name: Merge ${{ matrix.component }} image manifests
    runs-on: [self-hosted, linux]
    needs: [determine-version, build-and-push-images]

    strategy:
      matrix:
        component: [jaeger, es-rollover, es-index-cleaner]

    env:
      http_proxy: ${{ vars.http_proxy }}
      https_proxy: ${{ vars.https_proxy }}
      no_proxy: ${{ vars.no_proxy }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup crane
        uses: imjasonh/setup-crane@v0.4
        with:
          version: latest-release

      - name: Login to build-harbor.alauda.cn
        uses: docker/login-action@v4
        with:
          registry: build-harbor.alauda.cn
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Determine image name
        id: image-name
        run: |
          # 镜像名称映射：es-rollover -> jaeger-es-rollover，es-index-cleaner -> jaeger-es-index-cleaner，与官方命名保持一致
          case "${{ matrix.component }}" in
            es-rollover)       echo "image_name=jaeger-es-rollover" >> $GITHUB_OUTPUT ;;
            es-index-cleaner)  echo "image_name=jaeger-es-index-cleaner" >> $GITHUB_OUTPUT ;;
            *)                 echo "image_name=${{ matrix.component }}" >> $GITHUB_OUTPUT ;;
          esac

      - name: Merge image manifests and push
        env:
          TAG: ${{ needs.determine-version.outputs.tag }}
          IMAGE_NAME: ${{ steps.image-name.outputs.image_name }}
        run: |
          crane index append \
            -m "${IMG_PREFIX}/${IMAGE_NAME}:${TAG}-amd64" \
            -m "${IMG_PREFIX}/${IMAGE_NAME}:${TAG}-arm64" \
            -t "${IMG_PREFIX}/${IMAGE_NAME}:${TAG}"
